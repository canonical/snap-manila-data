name: manila-data
base: core26
build-base: devel
version: "2026.1"
license: Apache-2.0
summary: OpenStack Manila data migration and copy service
description: |
  Snap package for the manila-data service from OpenStack Manila, the Shared
  Filesystems service. The manila-data daemon handles data copy and migration
  operations between shares, such as driver-assisted and host-assisted share
  migration and creating shares from snapshots that require data copying.

  This snap includes support for Ceph (via ceph-common) and NFS backends.
  Configuration is managed through snap configuration options (snap set/get)
  for database connectivity, RabbitMQ messaging, debug mode, and telemetry
  notifications.

confinement: strict
grade: devel

environment:
  PYTHONPATH: $SNAP/lib/python3.14:$SNAP/lib/python3.14/site-packages:$SNAP/lib/python3.14/dist-packages:$PYTHONPATH

apps:
  manila-data:
    environment:
      # Standard library components must have priority in module name resolution: https://storyboard.openstack.org/#!/story/2007806
      PYTHONPATH: $PYTHONPATH:$SNAP/usr/lib/python3.14:$SNAP/usr/lib/python3.14/site-packages:$SNAP/usr/lib/python3/dist-packages:$SNAP/lib/python3.14:$SNAP/lib/python3.14/site-packages
    command: bin/manila-data
    daemon: simple
    plugs:
      - network
      - network-bind
      - mount-observe
      - nfs-mount

parts:
  openstack:
    plugin: nil
    stage-packages:
      - manila-data
      - ceph-common
    override-build: |
      craftctl default
      # purge some dangling symlinks
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/iab.txt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/oui.txt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3.14/dist-packages/netaddr/eui/iab.txt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3.14/dist-packages/netaddr/eui/oui.txt
    organize:
      usr/bin/: bin/
      usr/sbin/: bin/
      usr/lib/: lib/
      usr/share/: share/
    prime:
      - bin/manila-data
      - lib/python3

  manila-data:
    after: [openstack]
    plugin: uv
    source: .
    build-packages:
      - git
    build-snaps:
      - astral-uv
    build-environment:
      # PyO3 doesn't yet support Python 3.14; use stable ABI for forward compatibility
      - PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    stage-packages:
      - python3-venv
    override-build: |
      craftctl default
      manila-data-snap-helpers write-hooks
      # Remove venv symlinks that conflict with the openstack part
      rm -f $CRAFT_PART_INSTALL/bin/python
      rm -f $CRAFT_PART_INSTALL/bin/python3
      rm -f $CRAFT_PART_INSTALL/bin/python3.14
    override-prime: |
      craftctl default
      # Remove dangling venv symlinks pointing into the build directory.
      rm -f $CRAFT_PRIME/bin/python
      rm -f $CRAFT_PRIME/bin/python3
      rm -f $CRAFT_PRIME/bin/python3.14

  bin:
    source: bin/
    plugin: dump
    organize:
      "*": usr/bin/

hooks:
  install:
    plugs: [network]
  configure:
    plugs:
      - network
      - network-control
      - firewall-control
