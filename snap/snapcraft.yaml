name: manila-data
base: core24
version: "2024.1"
license: Apache-2.0
summary: OpenStack Manila data migration and copy service
description: |
  Snap package for the manila-data service from OpenStack Manila, the Shared
  Filesystems service. The manila-data daemon handles data copy and migration
  operations between shares, such as driver-assisted and host-assisted share
  migration and creating shares from snapshots that require data copying.

  This snap includes support for Ceph (via ceph-common) and NFS backends.
  Configuration is managed through snap configuration options (snap set/get)
  for database connectivity, RabbitMQ messaging, debug mode, and telemetry
  notifications.

confinement: strict

environment:
  PYTHONPATH: $SNAP/lib/python3.12:$SNAP/lib/python3.12/site-packages:$SNAP/lib/python3.12/dist-packages:$PYTHONPATH

apps:
  manila-data:
    environment:
      # Standard library components must have priority in module name resolution: https://storyboard.openstack.org/#!/story/2007806
      PYTHONPATH: $PYTHONPATH:$SNAP/usr/lib/python3.12:$SNAP/usr/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages:$SNAP/lib/python3.12:$SNAP/lib/python3.12/site-packages
    command: bin/manila-data
    daemon: simple
    plugs:
      - network
      - network-bind
      - mount-observe
      - nfs-mount

parts:
  openstack:
    plugin: nil
    stage-packages:
      - manila-data
      - ceph-common
    override-build: |
      craftctl default
      # purge some dangling symlinks
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/iab.txt
      rm -rf $CRAFT_PART_INSTALL/usr/lib/python3/dist-packages/netaddr/eui/oui.txt
    organize:
      usr/bin/: bin/
      usr/sbin/: bin/
      usr/lib/: lib/
      usr/share/: share/
    prime:
      - bin/manila-data
      - lib/python3

  manila-data:
    after: [openstack]
    plugin: python
    source: .
    build-packages:
      - git
    build-snaps:
      - astral-uv
    python-requirements:
      - requirements.txt
    override-build: |
      uv export --frozen --no-hashes --format=requirements-txt -o requirements.txt
      craftctl default
      manila-data-snap-helpers write-hooks

  bin:
    source: bin/
    plugin: dump
    organize:
      "*": usr/bin/

hooks:
  install:
    plugs: [network]
  configure:
    plugs:
      - network
      - network-control
      - firewall-control
